name: Build Hailo-10H Docker Images

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-ghcr-images.yml"
      - "docker/hailo10h/**"
      - "src/hailo10h_*/**"
  workflow_dispatch:
    inputs:
      model:
        description: "Model image to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - stdc1
          - fcn8_resnet_v1_18
          - mspn_regnetx_800mf
          - lightface_slim

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: seeed-projects/recomputer-hailo10h-cv
  SOURCE_REPOSITORY: https://github.com/Seeed-Projects/reComputer-Hailo10H-CV

jobs:
  build:
    name: Build ${{ matrix.model }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - model: stdc1
            image: stdc1
            description: STDC1 semantic segmentation
          - model: fcn8_resnet_v1_18
            image: fcn8_resnet_v1_18
            description: FCN8 ResNet-18 semantic segmentation
          - model: mspn_regnetx_800mf
            image: mspn_regnetx_800mf
            description: MSPN RegNetX-800MF pose estimation
          - model: lightface_slim
            image: lightface_slim
            description: LightFace Slim face detection
          - model: face_landmarks_lite
            image: face_landmarks_lite
            description: Face Landmarks Lite facial keypoint detection

    steps:
      - name: Select model
        id: selected
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "workflow_dispatch" || "${{ github.event.inputs.model }}" == "all" || "${{ github.event.inputs.model }}" == "${{ matrix.model }}" ]]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.selected.outputs.build == 'true'
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: steps.selected.outputs.build == 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        if: steps.selected.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.selected.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: steps.selected.outputs.build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=${{ matrix.model }}
            org.opencontainers.image.description=${{ matrix.description }} for Raspberry Pi 5 + Hailo-10H
            org.opencontainers.image.source=${{ env.SOURCE_REPOSITORY }}
            org.opencontainers.image.url=${{ env.SOURCE_REPOSITORY }}

      - name: Build and push
        if: steps.selected.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./src/hailo10h_${{ matrix.model }}
          file: ./docker/hailo10h/${{ matrix.model }}.dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.model }}
          cache-to: type=gha,mode=max,scope=${{ matrix.model }}
          provenance: false